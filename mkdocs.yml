site_name: PFTerminal
site_description: Crypto-native AI services terminal based on the open-source Codex CLI.
site_url: !ENV [PFTERMINAL_DOCS_SITE_URL, "http://127.0.0.1:8088/pfterminal/"]
repo_url: https://github.com/agtico/PfTerminal
repo_name: agtico/PfTerminal
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  logo: assets/images/post-fiat-mark.svg
  favicon: assets/images/favicon.png
  font: false
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: teal

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Start Here:
      - Install: install.md
      - Getting Started: getting-started.md
      - Authentication: authentication.md
      - Configuration: config.md
      - Example Config: example-config.md
      - Slash Commands: slash_commands.md
  - Current Security Sprint:
      - Overview: current-sprint/index.md
      - Agent Vault Access: current-sprint/agent-vault-access.md
  - Features:
      - Overview: features/index.md
      - Spawn Orchestration: features/spawn-orchestration.md
      - Spawn Acceptance Evidence: features/spawn-orchestration-acceptance.md
      - "/tasknode Slash Command": features/tasknode.md
      - Claude Headless Panes: features/claude-headless-panes.md
      - Claude Code Completion Spec: features/claude-code-integration-completion-spec.md
      - Codex Account Login: features/codex-account-login.md
      - GLM 5.2 Tool Compatibility: features/glm-52-tool-compatibility.md
      - Provider Hammer Reduction: features/hammer-reduction-process.md
      - Tool-Call Runaway Guard: features/tool-call-runaway-remedy.md
      - Native Provider Performance: features/native-provider-performance.md
      - Subagents: features/subagents.md
  - Orchestration:
      - Overview: orchestration/index.md
      - Nazgul: orchestration/nazgul.md
      - Troll: orchestration/troll.md
      - Orc: orchestration/orc.md
  - TBD:
      - Overview: TBD/index.md
  - Integrations:
      - Overview: integrations/index.md
      - Ambient: integrations/ambient.md
      - Z.AI GLM 5.2: integrations/zai-glm-52.md
      - OpenRouter: integrations/openrouter.md
      - Baseten: integrations/baseten.md
      - Vercel: integrations/vercel.md
      - Codex Fork: integrations/codex-fork.md
  - Runtime:
      - Exec: exec.md
      - Exec Policy: execpolicy.md
      - Sandbox: sandbox.md
      - Skills: skills.md
      - AGENTS.md: agents_md.md
  - Project:
      - Contributing: contributing.md
      - CI Coverage: ci.md
      - CLA: CLA.md
      - Open Source Fund: open-source-fund.md
      - License: license.md

plugins:
  - search
