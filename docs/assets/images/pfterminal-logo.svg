<svg viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PFTerminal logo</title>
  <desc id="desc">PFT wordmark with the Post Fiat glyph.</desc>
  <defs>
    <linearGradient id="terminal-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101410"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="pf-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ddffdc"/>
      <stop offset="0.42" stop-color="#7fee64"/>
      <stop offset="1" stop-color="#09af58"/>
    </linearGradient>
    <filter id="green-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.50 0 0 0 0 0.93 0 0 0 0 0.39 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="720" height="220" rx="28" fill="#000"/>
  <rect x="18" y="18" width="684" height="184" rx="20" fill="url(#terminal-bg)" stroke="rgba(221,255,220,.22)" stroke-width="2"/>
  <g transform="translate(58 42)">
    <rect width="136" height="136" rx="20" fill="#071007" stroke="rgba(221,255,220,.28)" stroke-width="2"/>
    <path d="M30 30 106 106m0-76L30 106" stroke="#ddffdc" stroke-width="14" stroke-linecap="round" fill="none" filter="url(#green-glow)"/>
    <line x1="30" y1="106" x2="106" y2="106" stroke="#ddffdc" stroke-width="14" stroke-linecap="round" filter="url(#green-glow)"/>
  </g>
  <text x="226" y="129" fill="#7fee64" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="96" font-weight="700" letter-spacing="0">PFT</text>
  <text x="230" y="168" fill="#bad8b6" font-family="Inter Tight, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="600" letter-spacing="0">Post Fiat Terminal</text>
</svg>
